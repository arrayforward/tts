// mediator_tts.proto — Mediator 网关 TTS 适配契约
// 与 /mnt/d/vit/mediator/proto/mediator.proto 中的 TtsService 部分逐字节对齐（仅取 TTS 相关定义）
syntax = "proto3";

package mediator;

// ---- TTS：文本转语音 ----
service TtsService {
  rpc Synth(TtsRequest) returns (TtsResponse);
}
message TtsRequest {
  string text = 1;
  string session_id = 2;
  uint32 clip_id = 3;  // 业务语义 clip：2=安抚 3=复述 4=答案 5=占位
}
message TtsResponse {
  bytes pcm = 1;       // PCM16 16kHz 单声道（网关侧再编 G.711A）
}
